name: Daily Intelligence Briefing

on:
  schedule:
    # This tells GitHub to run every day at 03:30 AM UTC
    # 03:30 AM UTC is 09:00 AM Indian Standard Time (IST)
    - cron: '30 3 * * *'
  workflow_dispatch: # This allows you to run it manually from GitHub anytime

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run News Pipeline
      env:
        # These will be pulled from your GitHub Secrets (I will show you how to set them up)
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        EMAIL_USER: ${{ secrets.EMAIL_USER }}
        EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
      run: python main.py
