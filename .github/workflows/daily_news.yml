name: Daily Intelligence Briefing

on:
  schedule:
    # This tells GitHub to run every day at 01:30 AM UTC
    # 01:30 AM UTC is 07:00 AM Indian Standard Time (IST)
    # Scheduling earlier ensures the email arrives closer to 09:00 AM despite GitHub's queue delays
    - cron: '30 1 * * *'
  workflow_dispatch: # This allows you to run it manually from GitHub anytime

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run News Pipeline
      env:
        # These will be pulled from your GitHub Secrets (I will show you how to set them up)
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        EMAIL_USER: ${{ secrets.EMAIL_USER }}
        EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
      run: |
        # Try running the pipeline up to 3 times to gracefully handle temporary API rate limits
        for i in 1 2 3; do
          echo "--- Attempt $i ---"
          if python main.py; then
            echo "Success!"
            exit 0
          fi
          echo "Attempt $i failed due to an error (likely a temporary API limit)."
          if [ $i -lt 3 ]; then
            echo "Waiting 3 minutes before trying again..."
            sleep 180
          fi
        done
        echo "Pipeline failed after 3 attempts."
        exit 1
